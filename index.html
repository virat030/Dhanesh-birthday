<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Dhanesh</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
overflow:hidden;
background:black;
color:white;
}

/* ===== GALAXY BACKGROUND ===== */
.stars{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, #ffffff22 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #ff00ff22 0%, transparent 40%),
radial-gradient(circle at 50% 50%, #00ffff22 0%, transparent 50%),
black;
animation:galaxyMove 20s linear infinite;
z-index:-2;
}

@keyframes galaxyMove{
0%{transform:scale(1) rotate(0deg);}
100%{transform:scale(1.2) rotate(360deg);}
}

/* FLOATING STARS */
.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:float 6s linear infinite;
opacity:.7;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* ===== HERO ===== */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* TITLE */
h1{
font-size:4.5rem;
color:#FFD700;
text-shadow:0 0 30px gold;
animation:rotateText 4s infinite alternate ease-in-out;
}

@keyframes rotateText{
0%{transform:rotateY(-20deg) rotateX(10deg);}
100%{transform:rotateY(20deg) rotateX(-10deg);}
}

h2{
margin-top:10px;
font-size:2rem;
}

/* ===== LEGEND TEXT ANIMATION (NEW) ===== */
#text{
margin-top:20px;
font-size:1.3rem;
font-weight:bold;
color:#fff;
letter-spacing:2px;

/* glow + pulse */
animation:glowPulse 1.5s infinite alternate;
}

@keyframes glowPulse{
0%{
text-shadow:0 0 5px #fff,0 0 10px #00ffff;
transform:scale(1);
opacity:.8;
}
100%{
text-shadow:0 0 20px #00ffff,0 0 40px #ff00ff;
transform:scale(1.08);
opacity:1;
}
}

/* BUTTON */
button{
margin-top:25px;
padding:15px 30px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#FFD700,#ff00ff);
color:black;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,.3);
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* BURST */
.burst{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:explode 3s linear forwards;
}

@keyframes explode{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-200px) scale(10);opacity:0;}
}

</style>
</head>

<body>

<div class="stars"></div>

<script>
for(let i=0;i<80;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(s);
}
</script>

<div class="hero">

<h1>HAPPY BIRTHDAY</h1>
<h2>DHANESH BROTHER ❤️</h2>

<!-- ANIMATED LINE -->
<div id="text"></div>

<button onclick="explode()">OPEN CELEBRATION 🎉</button>

</div>

<script>

/* TYPE EFFECT */
let msg="You are a legend born to shine ✨";
let i=0;

function type(){
if(i < msg.length){
document.getElementById("text").innerHTML += msg[i++];
setTimeout(type,40);
}
}
type();

/* CELEBRATION */
function explode(){
for(let i=0;i<120;i++){
let b=document.createElement("div");
b.className="burst";
b.style.left=Math.random()*100+"%";
b.style.background=["#ff0","#0ff","#f0f","#fff","#ff4d6d","#00ff88"][Math.floor(Math.random()*6)];
b.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(b);

setTimeout(()=>b.remove(),4000);
}
}

</script>

</body>
</html>
